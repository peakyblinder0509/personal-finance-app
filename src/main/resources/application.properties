# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
# ${ENV_VAR:default} means: read from environment variable, fall back to default.
# In production, set SPRING_DATASOURCE_URL etc. as real environment variables
# so secrets are never checked into version control.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate = Hibernate checks that the schema matches your entities but does NOT
# change anything. Flyway owns all schema changes.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
# Flyway runs automatically on startup and applies any pending migrations.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Jackson ───────────────────────────────────────────────────────────────────
# Serialize Instant as "2024-01-15T10:30:00Z" instead of [seconds, nanos] array.
spring.jackson.serialization.write-dates-as-timestamps=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# NEVER put real secrets here. Set JWT_SECRET as an environment variable.
app.jwt.secret=${JWT_SECRET:change-me-in-production-use-a-long-random-string}
app.jwt.expiration-ms=86400000

# ── Anthropic / Claude API ──────────────────────────────────────────────────
# NEVER hardcode the key. Set ANTHROPIC_API_KEY as a real environment variable.
# The empty default means: if the env var is missing, the app still starts and the
# AI endpoints simply return a fallback message — they don't crash on boot.
app.anthropic.api-key=${ANTHROPIC_API_KEY:}
app.anthropic.base-url=https://api.anthropic.com/v1/messages
app.anthropic.version=2023-06-01
app.anthropic.model=claude-haiku-4-5-20251001
app.anthropic.max-tokens=1024
# Timeouts protect us when Claude is slow or unreachable — we fail fast (in seconds)
# instead of leaving HTTP threads blocked indefinitely.
app.anthropic.connect-timeout-ms=5000
app.anthropic.read-timeout-ms=30000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.file.name=logs/application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

