# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
# ${ENV_VAR:default} means: read from environment variable, fall back to default.
# In production, set SPRING_DATASOURCE_URL etc. as real environment variables
# so secrets are never checked into version control.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate = Hibernate checks that the schema matches your entities but does NOT
# change anything. Flyway owns all schema changes.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
# Flyway runs automatically on startup and applies any pending migrations.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ───────────────────────────────────────────────────────────────────────
# NEVER put real secrets here. Set JWT_SECRET as an environment variable.
app.jwt.secret=${JWT_SECRET:change-me-in-production-use-a-long-random-string}
app.jwt.expiration-ms=86400000
