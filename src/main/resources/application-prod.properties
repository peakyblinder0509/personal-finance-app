# ──────────────────────────────────────────────────────────────────────────────
# PRODUCTION profile.  Activated by setting SPRING_PROFILES_ACTIVE=prod
# (we do exactly that in docker-compose.yml).
#
# Spring Boot loads application.properties FIRST, then overlays this file on top.
# So we only repeat the settings that must CHANGE for production. Everything else
# (Flyway, JPA dialect, Jackson date format, logging…) is inherited unchanged.
#
# Notice the env-var syntax differences below:
#   ${DB_URL}            → NO default. If the variable is missing the app refuses
#                          to start. That is what we WANT for required secrets in
#                          production — fail loudly instead of silently using a
#                          dev fallback.
#   ${ANTHROPIC_API_KEY:} → empty default, so the app still boots and the AI
#                          features degrade gracefully (same choice as dev).
# ──────────────────────────────────────────────────────────────────────────────

# ── Database ──────────────────────────────────────────────────────────────────
# In dev these had localhost defaults. In prod we require real values, injected
# as environment variables by docker-compose (which builds DB_URL pointing at the
# "postgres" container, NOT localhost).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── JWT ───────────────────────────────────────────────────────────────────────
# No default → the app will not start without a real secret. This prevents the
# "change-me-in-production" dev fallback from ever reaching a live server.
app.jwt.secret=${JWT_SECRET}

# ── Anthropic / Claude API ────────────────────────────────────────────────────
# Empty default: missing key disables AI endpoints instead of crashing the app.
app.anthropic.api-key=${ANTHROPIC_API_KEY:}

# ── Hardening for production ───────────────────────────────────────────────────
# Don't print every SQL statement to the logs in production: it's noisy and can
# leak data. (In dev, show-sql=true is handy for learning.)
spring.jpa.show-sql=false

# Don't expose raw exception messages/stack traces to API clients.
server.error.include-message=never
server.error.include-stacktrace=never
