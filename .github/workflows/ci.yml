# ==============================================================================
# Continuous Integration / Continuous Delivery pipeline.
#
# GitHub reads any *.yml file under .github/workflows/ and runs it on the events
# listed in "on:" below. This one runs on EVERY push to ANY branch.
#
# A "workflow" contains "jobs". Each job runs on its own fresh virtual machine
# (a "runner"). Jobs run in PARALLEL by default; we use "needs:" to force an
# order so a later job only starts after an earlier one succeeds.
# ==============================================================================
name: CI

on:
  push:           # trigger: someone runs `git push`
  pull_request:   # also run on PRs so problems are caught before merging

# Make the same values available to every job without repeating them.
env:
  JAVA_VERSION: '21'

jobs:
  # ============================================================================
  # JOB 1 — test: compile the code and run the test suite. This is the gate;
  # if it fails the whole pipeline stops and build/health-check never run.
  # ============================================================================
  test:
    runs-on: ubuntu-latest

    # NOTE: the test suite runs entirely on an in-memory H2 database (see
    # src/test/resources/application.properties), so this job needs no external
    # services. A PostgreSQL service container was removed because the tests
    # never connected to it, yet the job still failed when its POSTGRES_PASSWORD
    # secret was missing/empty — gating the test suite on a DB it doesn't use.
    # If real Postgres-backed integration tests are added later, reintroduce a
    # postgres service here and point those tests at it explicitly.

    steps:
      # Pull the repository's code onto the runner.
      - name: Check out code
        uses: actions/checkout@v4

      # Install a JDK. "cache: gradle" saves downloaded dependencies between
      # runs so later builds are much faster.
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # The wrapper script must be executable on Linux runners.
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Run the tests. A non-zero exit code here automatically fails the job,
      # which fails the pipeline — exactly the "fail if any test fails" rule.
      - name: Run tests
        run: ./gradlew test

      # Upload the HTML + XML test reports so you can download and read them
      # from the run's "Artifacts" section.
      # if: always() → upload even when tests FAILED (that's when you most want
      # to read the report). Without it, a failed test step would skip this.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/reports/tests/test
            build/test-results/test
          retention-days: 7

  # ============================================================================
  # JOB 2 — build: produce the JAR and publish a Docker image.
  # "needs: test" means this job ONLY starts if the test job succeeded.
  # ============================================================================
  build:
    needs: test
    runs-on: ubuntu-latest

    # Per-job permissions for the automatic GITHUB_TOKEN. We need to WRITE
    # packages (push the image to the registry) and only READ the repo.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Build the runnable "fat JAR". The Dockerfile also builds it internally,
      # so this step mainly proves the JAR assembles outside Docker and fails
      # fast if not.
      - name: Build bootJar
        run: ./gradlew bootJar -x test

      # GHCR image names must be all-lowercase, but the repo owner
      # "JacquesGuegong" contains capitals. ${VAR,,} lowercases it in bash.
      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # Authenticate to GitHub Container Registry. GITHUB_TOKEN is created
      # automatically for each run — no secret to manage.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the image from the Dockerfile and push it, tagged with the exact
      # commit SHA so every image is traceable back to one commit.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}

  # ============================================================================
  # JOB 3 — health-check: boot the whole stack and confirm it actually serves
  # traffic. Runs ONLY on pushes to main (e.g. after a PR is merged), because
  # the "if" condition checks the branch ref. PR builds and feature-branch
  # pushes skip this.
  # ============================================================================
  health-check:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # docker-compose.yml reads its ${VARS} from a .env file. We build that
      # file from GitHub Secrets at runtime. Secrets are masked in logs, so the
      # real values never appear in the build output.
      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          POSTGRES_DB=finance_tracker
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      # Build the app image and start app + postgres together, detached (-d).
      - name: Start the stack with docker compose
        run: docker compose up -d --build

      # Poll the health endpoint until it returns 200, or fail after ~2.5 min.
      # Spring Boot + Flyway need a few seconds to come up, so we retry instead
      # of curling once immediately.
      - name: Curl /api/health
        run: |
          for attempt in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health || true)
            if [ "$code" = "200" ]; then
              echo "Health check passed (HTTP 200)."
              exit 0
            fi
            echo "Attempt $attempt: got HTTP '$code', retrying in 5s..."
            sleep 5
          done
          echo "Health check FAILED — app never returned 200."
          docker compose logs   # dump logs so the failure is debuggable
          exit 1

      # Always clean up, even if the check failed. -v also removes the DB volume.
      - name: Tear down
        if: always()
        run: docker compose down -v
